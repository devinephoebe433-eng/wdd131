    <h1>Explore the World with Me!</h1>
    <p>Discover breathtaking destinations, hidden gems, and unforgettable experiences. Start your adventure today!</p>

    <section class="card">
        <figure>
            <figcaption>Paris, France</figcaption>
            <img src="images/paris.jpg" alt="Eiffel Tower in Paris" width="300">
            <p>Paris, the City of Light, is renowned for its art, culture, and iconic landmarks like the Eiffel Tower and Louvre Museum. A romantic destination that captivates visitors with its charm and history.</p>
        </figure>

        <figure>
            <figcaption>Kyoto, Japan</figcaption>
            <img src="images/kyoto.jpg" alt="Kinkaku-ji Temple in Kyoto" width="300">
            <p>Kyoto, Japan's cultural heart, is famous for its stunning temples, traditional tea houses, and beautiful gardens. A blend of ancient traditions and modern vibrancy makes it a must-visit destination.</p>
        </figure>

        <figure>
            <figcaption>New York City, USA</figcaption>
            <img src="images/nyc.jpg" alt="Statue of Liberty in New York City" width="300">
            <p>New York City, the Big Apple, is a bustling metropolis known for its iconic skyline, diverse culture, and vibrant arts scene. From Times Square to Central Park, there's always something exciting to explore.</p>
        </figure>

        <figure>
            <figcaption>Cape Town, South Africa</figcaption>
            <img src="images/capetown.jpg" alt="Table Mountain in Cape Town" width="300">
            <p>Cape Town offers stunning landscapes with Table Mountain as its backdrop. Known for its rich history and vibrant culture, it's a gateway to exploring South Africa's natural beauty and diverse wildlife.</p>
        </figure>
